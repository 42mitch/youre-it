name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_FIREBASE_API_KEY: AIzaSyD0x74WKZRVSXJgfW02sZfrpcPp1VuCAPI
          VITE_FIREBASE_AUTH_DOMAIN: tag-game-6c568.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: tag-game-6c568
          VITE_FIREBASE_STORAGE_BUCKET: tag-game-6c568.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "716236662780"
          VITE_FIREBASE_APP_ID: 1:716236662780:web:fc9af5f0e16ab4b424f479
          VITE_FIREBASE_MEASUREMENT_ID: G-FWQ7WEW4P0
          VITE_FIREBASE_VAPID_KEY: BIL6_JOktRjTV2jx1jW4m7zia_UdUSitTy7H8NegSjxMzXZsB5NTyPi_pvv_gUfHoMHdw93srw951mCqY2ddxOs
          VITE_API_URL: https://placeholder.com
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_OCEAN_0740DF710 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          api_location: ""
          output_location: "dist"
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_OCEAN_0740DF710 }}
          action: "close"
